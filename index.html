<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arthadrishti</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <header class="topbar">
    <div class="row">
      <select id="chapterSelect" class="select"></select>
      <div class="chips">
        <button class="chip active" data-metric="z2">Supply Value</button>
        <button class="chip" data-metric="z3">YoY Growth</button>
        <button class="chip" id="lbOpen" data-action="leaderboard">Leaderboard</button>
      </div>
    </div>
    <div class="subnote" id="subnote"></div>
  </header>

  <main>
    <section id="map" class="map"></section>

    <section class="kpis">
      <div class="kpi" id="kpiMandoli"></div>
      <div class="kpi" id="kpiGandhi"></div>
    </section>

    <div class="lb-backdrop" id="lbBackdrop" hidden></div>
    <section class="lb-modal" id="lbModal" hidden aria-hidden="true" role="dialog" aria-label="Leaderboard">
      <div class="lb-modal-card" id="lbCard">
        <div class="lb-handle">
          <div class="lb-grab"></div>
          <div class="lb-title">Leaderboard</div>
          <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
        </div>

        <div class="lb-tabs" id="lbTabs">
          <button class="lb-tab active" data-div="MANDOLI">Mandoli</button>
          <button class="lb-tab" data-div="GANDHINAGAR">Gandhinagar</button>
          <button class="lb-tab" data-div="DELHIEAST">Delhi East</button>
        </div>

        <div class="lb-grid">
          <div class="lb-col">
            <div class="lb-col-title">Value Leaders</div>
            <div class="lb-table" id="lbValue"></div>
          </div>
          <div class="lb-col">
            <div class="lb-col-title">Growth Leaders</div>
            <div class="lb-table" id="lbGrowth"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
