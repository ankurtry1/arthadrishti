<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arthadrishti</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <header class="topbar">
    <select id="hsnSelect" class="select"></select>

    <div class="tabs">
      <button class="tab active" data-region="MANDOLI">Mandoli (A)</button>
      <button class="tab" data-region="GANDHINAGAR">Gandhinagar (B)</button>
      <button class="tab" data-region="DELHI_EAST">Delhi East Zone (C)</button>
    </div>

    <div class="chips">
      <button class="chip active" data-metric="z2">Supply Value</button>
      <button class="chip" data-metric="z3">YoY Growth</button>
    </div>
  </header>

  <main>
    <section id="map" class="map"></section>

    <section class="kpis">
      <div class="kpi" id="kpiMandoli"></div>
      <div class="kpi" id="kpiGandhi"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
